name: Reusable macOS desktop build

on:
  workflow_call:

jobs:
  build-macos-dmg:
    name: Build macOS DMG
    permissions:
      contents: read
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Initialize disk image subsystem
        run: sudo hdiutil info > /dev/null

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend bundle and macOS runtime tarball
        run: pnpm backend:bundle && pnpm electron:backend:prepare

      - name: Build, Sign, and Notarize macOS desktop package
        env:
          CSC_LINK: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_CERT_PASSWORD }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm electron:package:mac

      - name: Rename DMG for release
        run: |
          set -eu
          mkdir -p dist-desktop
          DMG_PATH="$(find apps/electron/dist -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          test -n "$DMG_PATH" || { echo "No DMG artifact produced"; exit 1; }
          cp "$DMG_PATH" "dist-desktop/elevenex-desktop-macos-arm64.dmg"
          shasum -a 256 "dist-desktop/elevenex-desktop-macos-arm64.dmg" \
            > "dist-desktop/elevenex-desktop-macos-arm64.dmg.sha256"
          ls -lh dist-desktop/

      - uses: actions/upload-artifact@v4
        with:
          name: elevenex-desktop-macos-arm64
          path: dist-desktop/*
          if-no-files-found: error
          retention-days: 30

      - name: Rename macOS runtime tarball for release
        run: |
          set -eu
          mkdir -p dist-runtime
          cp apps/electron/.stage/backend.tar.gz \
             dist-runtime/elevenex-runtime-macos-arm64.tar.gz
          shasum -a 256 dist-runtime/elevenex-runtime-macos-arm64.tar.gz \
            > dist-runtime/elevenex-runtime-macos-arm64.tar.gz.sha256
          ls -lh dist-runtime/

      - uses: actions/upload-artifact@v4
        with:
          name: elevenex-runtime-macos-arm64
          path: dist-runtime/*
          if-no-files-found: error
          retention-days: 30

      - name: Prepare source map release assets
        run: |
          set -eu
          mkdir -p dist-source-maps
          cp apps/electron/.stage/source-maps/assets/* dist-source-maps/
          cp apps/electron/.stage/source-maps/manifest.json dist-source-maps/source-maps-manifest.json
          ls -lh dist-source-maps/

      - uses: actions/upload-artifact@v4
        with:
          name: elevenex-source-maps
          path: dist-source-maps/*
          if-no-files-found: error
          retention-days: 30
