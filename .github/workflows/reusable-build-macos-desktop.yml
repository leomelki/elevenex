name: Reusable macOS desktop build

on:
  workflow_call:

jobs:
  build-macos-dmg:
    name: Build macOS DMG
    permissions:
      contents: read
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.4
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Initialize disk image subsystem
        run: sudo hdiutil info > /dev/null

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, Sign, and Notarize macOS desktop package
        env:
          CERT_B64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_CERT_PASSWORD }}
          CSC_LINK: ${{ secrets.APPLE_CERT_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID_EMAIL }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "1. Decoding Base64..."
          echo "$CERT_B64" | base64 --decode > test_cert.p12
          
          echo "2. Checking file size..."
          ls -lh test_cert.p12
          
          echo "3. Extracting Identities..."
          # This will list what is actually inside the file. 
          # We pass the password automatically so the build doesn't hang.
          openssl pkcs12 -in test_cert.p12 -nokeys -passin pass:"$CERT_PASS" | grep "friendlyName" || echo "❌ FAILED TO UNLOCK OR EMPTY"
          pnpm electron:package:mac

      - name: Rename DMG for release
        run: |
          set -eu
          mkdir -p dist-desktop
          DMG_PATH="$(find apps/electron/dist -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          test -n "$DMG_PATH" || { echo "No DMG artifact produced"; exit 1; }
          cp "$DMG_PATH" "dist-desktop/elevenex-desktop-macos-arm64.dmg"
          shasum -a 256 "dist-desktop/elevenex-desktop-macos-arm64.dmg" \
            > "dist-desktop/elevenex-desktop-macos-arm64.dmg.sha256"
          ls -lh dist-desktop/

      - uses: actions/upload-artifact@v4
        with:
          name: elevenex-desktop-macos-arm64
          path: dist-desktop/*
          if-no-files-found: error
          retention-days: 30
