<div class="relative flex min-h-full items-center justify-center p-10 max-sm:p-5">
  <div class="info-page__backdrop pointer-events-none absolute inset-0"></div>

  <section
    class="info-card relative z-[1] flex w-[min(100%,560px)] flex-col items-center rounded-[32px] p-[42px] text-center backdrop-blur-[20px] max-sm:rounded-3xl max-sm:px-[22px] max-sm:py-7"
    aria-labelledby="info-title"
  >
    <div class="info-card__eyebrow inline-flex items-center gap-[0.45rem] rounded-full px-[0.8rem] py-[0.45rem] text-[0.72rem] font-bold tracking-[0.12em] uppercase">
      <ng-icon name="lucideInfo" size="14" />
      <span>About the app</span>
    </div>

    <img
      class="mt-6 size-[104px] rounded-3xl shadow-[0_10px_24px_rgba(15,23,42,0.12),inset_0_1px_0_rgba(255,255,255,0.4)]"
      src="11x.png"
      alt="Elevenex logo"
      width="104"
      height="104"
    />

    <h1 id="info-title" class="mt-6 text-[2rem] leading-[1.05] font-bold max-sm:text-[1.7rem]">Elevenex</h1>
    <p class="mt-3.5 max-w-[38ch] leading-[1.6] text-muted-foreground">
      Elevenex is a workspace hub for managing projects, repositories, branches, and coding sessions in one place.
    </p>

    <div class="info-card__meta mt-7 w-full rounded-[22px] px-[18px] py-2 text-left">
      <div class="info-card__row flex items-center justify-between gap-4 py-3.5 max-sm:flex-col max-sm:items-start max-sm:gap-1.5">
        <span class="text-[0.82rem] font-medium text-muted-foreground">Developer</span>
        <a
          class="inline-flex items-center gap-[0.35rem] text-[0.9rem] font-semibold text-foreground no-underline hover:text-primary"
          href="https://x.com/leomelki"
          rel="noreferrer"
          (click)="openExternal('https://x.com/leomelki', $event)"
        >
          &#64;leomelki
        </a>
      </div>
      <div class="info-card__row flex items-center justify-between gap-4 py-3.5 max-sm:flex-col max-sm:items-start max-sm:gap-1.5">
        <span class="text-[0.82rem] font-medium text-muted-foreground">Project</span>
        <a
          class="inline-flex items-center gap-[0.35rem] text-[0.9rem] font-semibold text-foreground no-underline hover:text-primary"
          href="https://github.com/leomelki/elevenex"
          rel="noreferrer"
          (click)="openExternal('https://github.com/leomelki/elevenex', $event)"
        >
          <span>GitHub repository</span>
          <ng-icon name="lucideArrowUpRight" size="14" />
        </a>
      </div>
      <div class="info-card__row flex items-center justify-between gap-4 py-3.5 max-sm:flex-col max-sm:items-start max-sm:gap-1.5">
        <span class="text-[0.82rem] font-medium text-muted-foreground">Frontend commit</span>
        <code class="font-mono text-[0.82rem] font-semibold tracking-[0.04em] text-foreground">{{ frontendSha }}</code>
      </div>
      <div class="info-card__row flex items-center justify-between gap-4 py-3.5 max-sm:flex-col max-sm:items-start max-sm:gap-1.5">
        <span class="text-[0.82rem] font-medium text-muted-foreground">Backend commit</span>
        <code class="font-mono text-[0.82rem] font-semibold tracking-[0.04em] text-foreground">{{ backendSha() }}</code>
      </div>
    </div>
  </section>
</div>
