<dialog #worktreeDialog="trackedNativeModal" trackNativeModal class="fixed inset-0 m-auto w-full max-w-md rounded-lg border border-border bg-background p-6 shadow-lg backdrop:bg-black/50">
  <h2 class="text-xl font-semibold text-foreground mb-4">New workspace</h2>
  <div class="space-y-4">
    <div>
      <div class="text-sm font-semibold text-foreground block mb-1">Branch</div>
      <div class="flex items-center rounded-md border border-border bg-muted/40 px-3 py-2 text-sm text-foreground">
        {{ branchName() }}
      </div>
    </div>
    <div>
      <label for="workspaceName" class="text-sm font-semibold text-foreground block mb-1">Workspace name</label>
      <input
        id="workspaceName"
        type="text"
        class="w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring"
        placeholder="Feature review"
        [ngModel]="workspaceName()"
        (ngModelChange)="workspaceName.set($event); updatePathFromName()" />
    </div>
    <div>
      <label for="worktreePath" class="text-sm font-semibold text-foreground block mb-1">Workspace path</label>
      <app-path-autocomplete-input
        inputId="worktreePath"
        placeholder="/path/to/.worktrees/repo-name/workspace-name"
        pathKind="directory"
        [value]="worktreePath()"
        [preferredStartDirectory]="preferredWorktreeStartDirectory()"
        (valueChange)="worktreePath.set($event)" />
    </div>
    <div class="flex justify-end gap-2 pt-2">
      <button
        class="rounded-md px-4 py-2 text-sm text-foreground hover:bg-muted"
        (click)="close()"
        [disabled]="creating()">
        Cancel
      </button>
      <button
        class="rounded-md bg-primary px-4 py-2 text-sm text-primary-foreground hover:bg-primary/90 disabled:opacity-50"
        (click)="submit()"
        [disabled]="creating() || !worktreePath() || !workspaceName() || !branchName()">
        @if (creating()) {
          <span class="animate-spin inline-block w-4 h-4 border-2 border-primary-foreground border-t-transparent rounded-full mr-2"></span>
        }
        Create workspace
      </button>
    </div>
  </div>
</dialog>
