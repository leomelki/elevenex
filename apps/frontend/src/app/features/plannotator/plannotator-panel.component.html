<div
  class="flex h-full min-h-0 w-full flex-col overflow-hidden border-l border-border bg-card text-card-foreground"
  [class.fixed]="isFullscreen()"
  [class.inset-0]="isFullscreen()"
  [class.z-[100]]="isFullscreen()"
  [class.border-l-0]="isFullscreen()">

  <div class="flex shrink-0 items-center justify-between border-b border-border bg-muted/40 px-4 py-3">
    <div class="flex items-center gap-2">
      <ng-icon [name]="getModeIcon()" class="text-lg text-primary" />
      <span class="text-sm font-medium text-foreground">{{ getModeLabel() }}</span>
    </div>
    <div class="flex items-center gap-1">
      <button class="flex size-7 cursor-pointer items-center justify-center rounded border-0 bg-transparent text-muted-foreground transition-all hover:bg-accent hover:text-accent-foreground disabled:cursor-not-allowed disabled:opacity-50" (click)="refresh()" title="Refresh" [disabled]="isLoading">
        <ng-icon name="lucideRefreshCw" [class.animate-spin]="isLoading" />
      </button>
      <button class="flex size-7 cursor-pointer items-center justify-center rounded border-0 bg-transparent text-muted-foreground transition-all hover:bg-accent hover:text-accent-foreground" (click)="toggleFullscreen()" [title]="isFullscreen() ? 'Exit fullscreen' : 'Fullscreen'">
        <ng-icon [name]="isFullscreen() ? 'lucideMinimize2' : 'lucideMaximize2'" />
      </button>
      @if (!isFullscreen()) {
        <button class="flex size-7 cursor-pointer items-center justify-center rounded border-0 bg-transparent text-muted-foreground transition-all hover:bg-accent hover:text-accent-foreground" (click)="minimize.emit()" title="Hide panel">
          <ng-icon name="lucideMinus" />
        </button>
      }
      <button class="flex size-7 cursor-pointer items-center justify-center rounded border-0 bg-transparent text-muted-foreground transition-all hover:bg-destructive/10 hover:text-destructive" (click)="onClose()" title="Close">
        <ng-icon name="lucideX" />
      </button>
    </div>
  </div>

  <div class="relative flex-1 overflow-hidden">
    @if (isLoading) {
      <div class="absolute inset-0 z-10 flex flex-col items-center justify-center gap-4 bg-card text-muted-foreground">
        <div class="size-8 animate-spin rounded-full border-[3px] border-border border-t-primary"></div>
        <span>Loading...</span>
      </div>
    }

    @if (safeUrl) {
      <iframe
        #plannotatorIframe
        [src]="safeUrl"
        (load)="onIframeLoad()"
        class="h-full w-full border-0 bg-card"
        frameborder="0"
        allowfullscreen
      ></iframe>
    } @else {
      <div class="flex h-full flex-col items-center justify-center gap-4 text-muted-foreground">
        <ng-icon name="lucideFileText" class="text-5xl opacity-50" />
        <p>Waiting for Plannotator...</p>
      </div>
    }
  </div>
</div>
