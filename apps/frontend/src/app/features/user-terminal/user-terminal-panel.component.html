<div class="flex h-full flex-col border-t border-[#292e42] bg-[#1a1b26]">
  <!-- Header with terminal tabs -->
  <div class="flex h-9 min-h-9 items-center justify-between gap-1 border-b border-[#292e42] bg-[#16161e] py-0 pr-1 pl-2">
    <div class="flex min-w-0 flex-1 items-center gap-0.5 overflow-x-auto [&::-webkit-scrollbar]:h-0">
      @for (terminal of terminals(); track terminal.id) {
        <button
          class="group flex cursor-pointer items-center gap-1.5 rounded border-0 bg-transparent px-2 py-1 text-xs whitespace-nowrap text-[#565f89] transition-colors hover:bg-white/5 hover:text-[#c0caf5]"
          [ngClass]="isActive(terminal.id) ? 'bg-white/[0.08] text-[#c0caf5]' : ''"
          (click)="selectTerminal(terminal.id)"
          [title]="terminal.name + ' (' + terminal.shell + ')'"
        >
          <ng-icon name="lucideTerminal" size="12" class="opacity-70" />
          <span class="max-w-[120px] overflow-hidden text-ellipsis">{{ terminal.name }}</span>
          <button
            class="flex size-4 cursor-pointer items-center justify-center rounded-[3px] border-0 bg-transparent text-inherit opacity-0 transition-[opacity,background-color] hover:bg-white/[0.12] hover:text-[#f7768e] group-hover:opacity-100"
            [class.opacity-100]="isActive(terminal.id)"
            title="Kill terminal"
            (click)="closeTerminal($event, terminal.id)"
          >
            <ng-icon name="lucideX" size="12" />
          </button>
        </button>
      }
      <button
        class="flex size-6 shrink-0 cursor-pointer items-center justify-center rounded border-0 bg-transparent text-[#565f89] transition-colors hover:bg-white/[0.08] hover:text-[#c0caf5]"
        title="New terminal"
        (click)="createTerminal()"
      >
        <ng-icon name="lucidePlus" size="14" />
      </button>
    </div>
    <button
      class="flex size-6 shrink-0 cursor-pointer items-center justify-center rounded border-0 bg-transparent text-[#565f89] transition-colors hover:bg-white/[0.08] hover:text-[#c0caf5]"
      title="Close panel"
      (click)="closePanel()"
    >
      <ng-icon name="lucideX" size="14" />
    </button>
  </div>

  <!-- Terminal views -->
  <div class="relative min-h-0 flex-1">
    @for (terminal of terminals(); track terminal.id) {
      <div
        class="h-full"
        [class.hidden]="!isActive(terminal.id)"
      >
        <app-user-terminal-view [terminalId]="terminal.id" />
      </div>
    }
  </div>
</div>
