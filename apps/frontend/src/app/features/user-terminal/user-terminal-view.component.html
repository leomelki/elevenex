<div class="terminal-wrapper h-full w-full relative bg-[#1a1b26] overflow-hidden">
  @if (connecting()) {
    <div class="absolute inset-0 flex items-center justify-center bg-[#1a1b26] z-10">
      <div class="flex items-center gap-2.5">
        <span class="inline-block h-1.5 w-1.5 rounded-full bg-[#7aa2f7] animate-pulse"></span>
        <span class="text-[#565f89] text-xs font-medium tracking-wide">Connecting</span>
      </div>
    </div>
  }
  @if (!connected() && !connecting()) {
    <div class="absolute inset-0 flex items-center justify-center bg-[#1a1b26] z-10">
      <div class="flex items-center gap-2.5">
        <span class="inline-block h-1.5 w-1.5 rounded-full bg-[#f7768e]"></span>
        <span class="text-[#565f89] text-xs font-medium tracking-wide">
          @if (retryActive() && retryLabel(); as retryLabel) {
            Retrying in {{ retryLabel }}
          } @else {
            Disconnected
          }
        </span>
      </div>
    </div>
  }
  <div #terminalContainer class="h-full w-full"></div>
</div>
